name = "crysnovax-premium"
account_id = "282b269d2530a8f05d715d715c81ba69"
main = "src/worker.js"
compatibility_date = "2026-07-16"
workers_dev = true

[vars]
DASHBOARD_ORIGIN = "https://premium.crysnova.qzz.io"
API_VERSION = "v1"

[[d1_databases]]
binding = "DB"
database_name = "crysnovax-premium"
database_id = "REPLACE_WITH_D1_DATABASE_ID"
migrations_dir = "migrations"

[assets]
directory = "./public"
binding = "ASSETS"
run_worker_first = true

[triggers]
crons = ["17 0 * * *"]
