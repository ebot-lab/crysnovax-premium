<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="theme-color" content="#101817"><title>Sign in — CODYE Control</title><link rel="stylesheet" href="/dashboard.css"></head><body><main style="width:100%;max-width:520px;margin:auto;padding:64px 20px"><section class="panel" style="text-align:center"><span class="mark" style="margin:0 auto 20px">C</span><p class="eyebrow">SECURE OPERATIONS</p><h1>CODYE Control</h1><p class="muted">Sign in with the Telegram account configured as a bot owner. Access attempts are validated against Telegram&apos;s signed payload and recorded.</p><div id="telegram-login" style="margin:24px auto"></div><p id="error" class="result" role="alert"></p></section></main><script>fetch('/api/public-config').then(r=>r.json()).then(({botUsername})=>{if(!botUsername)throw new Error('Bot username unavailable');const s=document.createElement('script');s.async=true;s.src='https://telegram.org/js/telegram-widget.js?22';s.dataset.telegramLogin=botUsername;s.dataset.size='large';s.dataset.authUrl=location.origin+'/auth/telegram';s.dataset.requestAccess='write';document.querySelector('#telegram-login').appendChild(s)}).catch(e=>document.querySelector('#error').textContent=e.message);</script></body></html>
